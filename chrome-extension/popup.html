<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-logo">
        <div class="popup-logo-icon">M</div>
        <span class="popup-logo-text">MDRS</span>
      </div>
      <div class="popup-status" id="status-indicator">
        <span class="popup-status-dot" id="status-dot"></span>
        <span id="status-text">Checking...</span>
      </div>
    </div>

    <!-- Quick Info -->
    <div class="popup-info">
      <p class="popup-desc">
        Right-click any <strong>text</strong>, <strong>image</strong>, <strong>audio</strong>, or <strong>video</strong> to scan for deception signals.
      </p>
      <p class="popup-desc popup-desc-sub">
        Or select text and click the <strong>Scan</strong> button that appears.
      </p>
    </div>

    <!-- Actions -->
    <button class="popup-btn" id="open-panel-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <line x1="15" y1="3" x2="15" y2="21"/>
      </svg>
      Open Side Panel
    </button>

    <!-- Settings -->
    <div class="popup-settings">
      <label class="popup-label" for="api-url">API Endpoint</label>
      <div class="popup-input-row">
        <input
          type="url"
          id="api-url"
          class="popup-input"
          placeholder="http://localhost:8000"
        />
        <button class="popup-save-btn" id="save-url-btn">Save</button>
      </div>
      <p class="popup-hint" id="save-hint"></p>

      <label class="popup-label" for="gemini-key" style="margin-top: 12px;">
        Your Gemini API Key <span style="opacity:0.6;font-weight:400;">(optional)</span>
      </label>
      <div class="popup-input-row">
        <input
          type="password"
          id="gemini-key"
          class="popup-input"
          placeholder="AIza... (leave blank for hosted)"
          autocomplete="off"
        />
        <button class="popup-save-btn" id="save-key-btn">Save</button>
      </div>
      <p class="popup-hint" id="key-hint">
        Stored only in this browser. Sent with each scan and used instead of the hosted Gemini.
      </p>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <span>Multimodal Deception Risk Scorer</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
